<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>English Learning Tool</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --primary: #e94560;
  --accent: #0f3460;
  --text: #eee;
  --muted: #8899aa;
  --green: #2ecc71;
  --yellow: #f1c40f;
  --cyan: #00d4ff;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: 70px;
  -webkit-tap-highlight-color: transparent;
}
.header {
  background: linear-gradient(135deg, #e94560, #0f3460, #1a1a2e);
  padding: 16px 20px 12px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 {
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  display: flex;
  border-top: 1px solid #1a1a3e;
  z-index: 10;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-btn {
  flex: 1;
  padding: 8px 4px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn .icon { font-size: 20px; line-height: 1; }
.tab-btn.active { color: var(--primary); }
.tab-btn:active { opacity: 0.6; }
.content {
  flex: 1;
  padding: 12px;
  display: none;
}
.content.active { display: block; }
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card h3 {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.btn {
  display: inline-block;
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.btn:active { transform: scale(0.96); opacity: 0.8; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-success { background: var(--green); color: #fff; }
.btn-warning { background: var(--yellow); color: #333; }
.btn-outline {
  background: transparent;
  border: 2px solid var(--muted);
  color: var(--text);
}
.btn-full { width: 100%; text-align: center; }
.btn-group { display: flex; gap: 8px; margin-top: 12px; }
.btn-group .btn { flex: 1; }
.word-display {
  text-align: center;
  padding: 20px 0;
}
.word-display .word {
  font-size: 28px;
  font-weight: 700;
  color: var(--yellow);
}
.word-display .ipa {
  font-size: 16px;
  color: var(--cyan);
  margin-top: 4px;
}
.word-display .meaning {
  font-size: 18px;
  color: var(--green);
  margin-top: 12px;
}
.word-display .example {
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
  font-style: italic;
}
.word-display .example-vi {
  font-size: 13px;
  color: var(--green);
  margin-top: 4px;
}
.word-display .definition {
  font-size: 14px;
  color: var(--cyan);
  margin-top: 8px;
  font-weight: 500;
}
.word-display .definition-vi {
  font-size: 14px;
  color: var(--green);
  margin-top: 2px;
}
.option-btn {
  display: block;
  width: 100%;
  padding: 12px 16px;
  margin-bottom: 8px;
  background: var(--card);
  border: 2px solid #2a2a4e;
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  min-height: 44px;
}
.option-btn:active { border-color: var(--primary); }
.option-btn.correct { border-color: var(--green); background: rgba(46,204,113,0.15); }
.option-btn.wrong { border-color: var(--primary); background: rgba(233,69,96,0.15); }
.option-btn.disabled { pointer-events: none; opacity: 0.7; }
.search-box {
  width: 100%;
  padding: 12px 16px;
  background: var(--card);
  border: 2px solid #2a2a4e;
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--cyan); }
.search-box::placeholder { color: var(--muted); }
.progress-bar {
  height: 8px;
  background: #2a2a4e;
  border-radius: 4px;
  overflow: hidden;
  margin: 8px 0;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--yellow), var(--green));
  border-radius: 4px;
  transition: width 0.5s ease;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #2a2a4e;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--muted); font-size: 14px; }
.stat-value { font-weight: 600; font-size: 14px; }
.meaning-box {
  background: rgba(46,204,113,0.1);
  border-left: 3px solid var(--green);
  padding: 12px;
  border-radius: 0 8px 8px 0;
  margin-top: 8px;
}
.pos-header {
  font-weight: 700;
  color: var(--cyan);
  font-size: 13px;
  text-transform: uppercase;
  margin: 16px 0 8px;
}
.def-num {
  display: inline-block;
  width: 22px;
  height: 22px;
  line-height: 22px;
  text-align: center;
  background: var(--primary);
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  margin-right: 8px;
  flex-shrink: 0;
}
.def-item {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.5;
}
.def-example {
  color: var(--muted);
  font-style: italic;
  font-size: 13px;
  margin-top: 4px;
  padding-left: 30px;
}
.def-synonyms {
  color: var(--green);
  font-size: 12px;
  padding-left: 30px;
  margin-top: 2px;
}
.syn-tag {
  display: inline-block;
  background: rgba(46,204,113,0.15);
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 4px;
  font-size: 11px;
}
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
}
.setting-label { font-size: 14px; }
.lang-btn {
  padding: 6px 16px;
  border: 2px solid #2a2a4e;
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  margin-left: 4px;
}
.lang-btn.active {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}
.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid #2a2a4e;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.hidden { display: none !important; }
.result-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}
.result-badge.correct { background: rgba(46,204,113,0.2); color: var(--green); }
.result-badge.wrong { background: rgba(233,69,96,0.2); color: var(--primary); }
.tab-badge {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  font-size: 10px;
  padding: 0 6px;
  border-radius: 10px;
  margin-left: 4px;
  line-height: 16px;
}
.fade-in { animation: fadeIn 0.3s ease; }
.word-item { cursor: pointer; transition: transform 0.15s, border-color 0.15s; border: 1px solid transparent; }
.word-item:hover { transform: translateX(4px); border-color: var(--cyan); }
.word-item:active { transform: scale(0.99); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 480px) {
  body { padding-bottom: 80px; }
  .header { padding: 10px 12px 8px; }
  .header h1 { font-size: 17px; }
  .header p { font-size: 11px; }
  .tab-btn { padding: 10px 2px; font-size: 10px; gap: 1px; }
  .tab-btn .icon { font-size: 22px; }
  .content { padding: 8px; }
  .card { padding: 12px; }
  .card h3 { font-size: 13px; }
  .word-display { padding: 12px 0; }
  .word-display .word { font-size: 22px; }
  .word-display .ipa { font-size: 14px; }
  .word-display .meaning { font-size: 16px; }
  .word-display .example { font-size: 12px; }
  .word-display .definition { font-size: 13px; }
  .word-display .definition-vi { font-size: 13px; }
  .word-display .example-vi { font-size: 12px; }
  .btn { padding: 10px 16px; font-size: 13px; min-height: 44px; }
  .option-btn { padding: 12px 14px; font-size: 13px; }
  .search-box { font-size: 15px; padding: 10px 14px; }
  .stat-label { font-size: 13px; }
  .stat-value { font-size: 13px; }
  .setting-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  .lang-btn { padding: 8px 20px; font-size: 14px; margin-left: 0; margin-right: 4px; }
  .def-item { font-size: 13px; }
  .def-example { font-size: 12px; padding-left: 24px; }
}</style>
</head>

<div class="header">

<div id="tab-flashcards" class="content active">

</div>

  <div id="dict-result" class="mt-12"></div>
</div>

<div id="tab-quiz" class="content">
  <div id="quiz-content"></div>
</div>

<div id="tab-grammar" class="content">
  <div id="grammar-content"></div>
</div>

<div id="tab-progress" class="content">
  <div id="progress-content"></div>
</div>

<div id="tab-words" class="content">

</div>

<div id="tab-settings" class="content">

    </div>
  </div>
  <div class="card">

    </p>
  </div>
</div>

<div class="tab-bar">

  </button>
  <button class="tab-btn" data-tab="progress">

    <span id="tab-label-prog">Progress</span>
  </button>
  <button class="tab-btn" data-tab="words">

  <button class="tab-btn" data-tab="settings">

</div>

    grammar_conditional: "C\u00e2u \u0110i\u1ec1u Ki\u1ec7n",
    grammar_formula: "C\u00f4ng th\u1ee9c",
    grammar_usage: "C\u00e1ch d\u00f9ng",
    grammar_keywords: "D\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft",
    grammar_examples: "V\u00ed d\u1ee5",
    grammar_expand: "Ch\u1ea1m \u0111\u1ec3 xem",
  }
};

let lang = "vi";
let fcState = null;
let fcTypeMode = false;
let quizState = null;

function t(key) {
  return (STRINGS[lang] || STRINGS.en)[key] || key;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

function updateStrings() {
  document.getElementById("app-title").textContent = t("title");
  document.getElementById("app-tagline").textContent = t("tagline");
  document.getElementById("tab-label-fc").textContent = t("tab_fc");
  document.getElementById("tab-label-dict").textContent = t("tab_dict");
  document.getElementById("tab-label-quiz").textContent = t("tab_quiz");
  document.getElementById("tab-label-prog").textContent = t("tab_prog");
  document.getElementById("tab-label-words").textContent = t("tab_words");
  document.getElementById("tab-label-grammar").textContent = t("tab_grammar");
  document.getElementById("tab-label-sett").textContent = t("tab_sett");
  document.getElementById("dict-input").placeholder = t("dict_placeholder");
  document.getElementById("dict-search").textContent = t("dict_search");
  document.getElementById("settings-lang-title").textContent = t("settings_lang");
  document.getElementById("settings-lang-label").textContent = t("settings_lang_label");
  document.getElementById("about-text").textContent = t("about");
}

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// Tab switching
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "flashcards") renderFlashcards();
    if (btn.dataset.tab === "progress") renderProgress();
    if (btn.dataset.tab === "quiz") renderQuiz();
    if (btn.dataset.tab === "words") renderWords();
    if (btn.dataset.tab === "grammar") renderGrammar();
  });
});

// Settings
document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", async () => {
    const l = btn.dataset.lang;
    await api("POST", "/api/lang", { lang: l });
    lang = l;
    document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    updateStrings();
    renderFlashcards();
    renderProgress();
    renderWords();
  });
});

async function init() {
  try {
    const r = await api("GET", "/api/lang");
    lang = r.lang;
    document.querySelectorAll(".lang-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === lang);
    });
    if (lang !== "en" && lang !== "vi") lang = "vi";
    updateStrings();
  } catch {}
  renderFlashcards();
  renderProgress();
  renderWords();
  renderGrammar();
}

// ----- FLASHCARDS -----
async function renderFlashcards() {
  const el = document.getElementById("fc-content");
  if (fcState && fcState.step < fcState.words.length) {
    renderFcCard(el, fcState);
    return;
  }
  try {
    const r = await api("GET", "/api/review-words");
    if (!r.words || r.words.length === 0) {
      el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--muted);padding:20px 0">${t("fc_no_words")}</p></div>`;
      return;
    }
    fcState = { words: r.words, step: 0, correct: 0 };
    renderFcCard(el, fcState);
  } catch {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary);padding:20px 0">${t("dict_network")}</p></div>`;
  }
}

function renderFcCard(el, state) {
  if (state.step >= state.words.length) {
    renderFcComplete(el, state);
    return;
  }
  const w = state.words[state.step];
  const revealed = state.revealed;
  const typeResult = state.typeResult;
  const isTypeMode = fcTypeMode;

  el.innerHTML = `
    <div style="text-align:right;margin-bottom:8px">
      <button class="btn btn-outline" id="fc-mode-toggle" style="font-size:11px;padding:4px 12px;min-height:auto">
        ${isTypeMode ? t("fc_reveal_mode") : t("fc_type_mode")}
      </button>
      <button class="btn btn-outline" id="fc-speak" style="font-size:11px;padding:4px 12px;min-height:auto;margin-left:4px">
        🔊 ${t("dict_audio")}
      </button>
    </div>
    <div class="card fade-in">
      <div class="word-display">
        <div class="word">${esc(w.word)}</div>
        <div class="ipa">${esc(w.ipa)}</div>
        ${revealed && !isTypeMode ? `
          <div class="meaning mt-12">${esc(w.meaning)}</div>
          ${w.definition ? `<div class="definition">📖 ${esc(w.definition)}</div>` : ""}
          ${w.definition_vi ? `<div class="definition-vi">📝 ${esc(w.definition_vi)}</div>` : ""}
          <div class="example">${esc(w.example)}</div>
          ${w.example_vi ? `<div class="example-vi">📝 ${esc(w.example_vi)}</div>` : ""}
        ` : !isTypeMode ? `
          <p style="color:var(--muted);font-size:13px;margin-top:16px">${t("fc_tap_reveal")}</p>
        ` : typeResult ? `
          <div class="meaning mt-12 ${typeResult.correct ? '' : ''}" style="color:${typeResult.correct ? 'var(--green)' : 'var(--primary)'}">
            ${typeResult.correct ? t("fc_type_correct") : t("fc_type_wrong")} ${esc(w.meaning)}
          </div>
          ${w.definition ? `<div class="definition">📖 ${esc(w.definition)}</div>` : ""}
          ${w.definition_vi ? `<div class="definition-vi">📝 ${esc(w.definition_vi)}</div>` : ""}
          <div class="example">${esc(w.example)}</div>
          ${w.example_vi ? `<div class="example-vi">📝 ${esc(w.example_vi)}</div>` : ""}
        ` : `
          <div style="margin-top:16px">
            <p style="color:var(--muted);font-size:13px;margin-bottom:8px">${t("fc_type_prompt")}</p>
            <input type="text" id="fc-type-input" class="search-box" placeholder="${t("fc_type_placeholder")}" autofocus>
            <button class="btn btn-primary btn-full mt-8" id="fc-type-submit">${t("fc_type_submit")}</button>
          </div>
        `}
      </div>
    </div>
    ${!isTypeMode && !revealed ? `
      <button class="btn btn-primary btn-full mt-8" id="fc-reveal">${t("fc_tap_reveal")}</button>
    ` : !isTypeMode && revealed ? `
      <div class="btn-group">
        <button class="btn btn-success" id="fc-yes">${t("fc_know")}</button>
        <button class="btn btn-warning" id="fc-no">${t("fc_dont_know")}</button>
      </div>
    ` : isTypeMode && typeResult ? `
      <button class="btn btn-primary btn-full mt-8" id="fc-next">${t("fc_next")}</button>
    ` : ""}
    <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:8px">${state.step + 1} / ${state.words.length}</p>
  `;

  document.getElementById("fc-mode-toggle")?.addEventListener("click", () => {
    fcTypeMode = !fcTypeMode;
    state.revealed = false;
    state.typeResult = null;
    renderFcCard(el, state);
  });
  document.getElementById("fc-speak")?.addEventListener("click", () => speak(w.word));

  document.getElementById("fc-reveal")?.addEventListener("click", () => {
    state.revealed = true;
    renderFcCard(el, state);
  });
  document.getElementById("fc-yes")?.addEventListener("click", async () => {
    await api("POST", "/api/review", { word_id: w.id, known: true });
    state.correct++;
    state.step++;
    state.revealed = false;
    state.typeResult = null;
    renderFcCard(el, state);
  });
  document.getElementById("fc-no")?.addEventListener("click", async () => {
    await api("POST", "/api/review", { word_id: w.id, known: false });
    state.step++;
    state.revealed = false;
    state.typeResult = null;
    renderFcCard(el, state);
  });
  document.getElementById("fc-type-submit")?.addEventListener("click", () => checkFcType(state, el, w));
  document.getElementById("fc-type-input")?.addEventListener("keydown", (e) => {
    if (e.key === "Enter") checkFcType(state, el, w);
  });
  document.getElementById("fc-next")?.addEventListener("click", async () => {
    const wasCorrect = state.typeResult?.correct;
    await api("POST", "/api/review", { word_id: w.id, known: wasCorrect });
    if (wasCorrect) state.correct++;
    state.step++;
    state.typeResult = null;
    renderFcCard(el, state);
  });
}

function checkFcType(state, el, w) {
  const input = document.getElementById("fc-type-input");
  const answer = input ? input.value.trim().toLowerCase() : "";
  const correct = answer === w.meaning.toLowerCase();
  state.typeResult = { correct };
  renderFcCard(el, state);
}

function renderFcComplete(el, state) {
  const total = state.words.length;
  const pct = total ? Math.round(state.correct / total * 100) : 0;
  let msg = t("fc_try_again");
  if (pct >= 80) msg = t("fc_excellent");
  else if (pct >= 50) msg = t("fc_good");

  el.innerHTML = `
    <div class="card text-center fade-in">
      <h3>${t("fc_complete")}</h3>
      <div style="font-size:36px;margin:12px 0">${state.correct}/${total}</div>
      <div class="progress-bar" style="max-width:200px;margin:8px auto">
        <div class="fill" style="width:${pct}%"></div>
      </div>
      <p style="color:var(--muted);font-size:13px">${t("fc_score")} ${pct}%</p>
      <p style="margin-top:8px;font-weight:600">${msg}</p>
    </div>
    <button class="btn btn-primary btn-full mt-8" id="fc-restart">${t("fc_review_btn")}</button>
  `;
  document.getElementById("fc-restart")?.addEventListener("click", () => {
    fcState = null;
    renderFlashcards();
  });
}

// ----- DICTIONARY -----
document.getElementById("dict-search").addEventListener("click", dictSearch);
document.getElementById("dict-input").addEventListener("keydown", e => {
  if (e.key === "Enter") dictSearch();
});

async function dictSearch() {
  const word = document.getElementById("dict-input").value.trim();
  if (!word) return;
  const el = document.getElementById("dict-result");
  el.innerHTML = `<div class="text-center mt-16"><div class="spinner"></div><p style="color:var(--muted);font-size:13px;margin-top:8px">${t("dict_lookup")}</p></div>`;

  try {
    const res = await fetch("/api/dictionary?word=" + encodeURIComponent(word));
    const data = await res.json();
    renderDictResult(el, data, word);
  } catch {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary)">${t("dict_network")}</p></div>`;
  }
}

function renderDictResult(el, data, word) {
  if (data.not_found) {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary)">${t("dict_not_found")}: "${esc(word)}"</p></div>`;
    return;
  }
  if (data.error) {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary)">${data.error}</p></div>`;
    return;
  }

  let html = `<div class="card fade-in">`;
  html += `<div class="word-display" style="padding:0 0 12px 0">
    <div class="word">${esc(data.word)}</div>`;
  if (data.ipa) html += `<div class="ipa">${esc(data.ipa)}</div>`;
  if (data.audio) html += `<button class="btn btn-outline mt-8" onclick="playAudio('${esc(data.audio)}')" style="font-size:12px;padding:6px 12px">🔊 ${t("dict_audio")}</button>`;
  html += `</div></div>`;

  if (data.definition) {
    html += `<div class="card fade-in" style="border-left:3px solid var(--cyan)">
      <h3>English</h3>
      <div style="font-size:15px;color:var(--cyan);font-weight:500">📖 ${esc(data.definition)}</div>
      ${data.definition_vi ? `<div style="font-size:14px;color:var(--green);margin-top:4px">📝 ${esc(data.definition_vi)}</div>` : ""}
    </div>`;
  }

  if (lang === "vi" && data.vi_meaning) {
    html += `<div class="card fade-in" style="border-left:3px solid var(--green)">
      <h3>${t("dict_vi")}</h3>
      <div style="font-size:16px;font-weight:600;color:var(--green);margin:4px 0">${esc(data.vi_meaning)}</div>
      ${data.vi_example ? `<div style="color:var(--muted);font-style:italic;font-size:13px;margin-top:4px">▸ ${esc(data.vi_example)}</div>` : ""}
      ${data.example_vi ? `<div style="color:var(--green);font-size:13px;margin-top:2px">📝 ${esc(data.example_vi)}</div>` : ""}
    </div>`;
  }

  if (data.meanings) {
    data.meanings.forEach(m => {
      html += `<div class="card fade-in"><h3>${esc(m.partOfSpeech)}</h3>`;
      m.definitions.forEach((d, i) => {
        html += `<div class="def-item"><span class="def-num">${i+1}</span><div>
          <span>${esc(d.definition)}</span>`;
        if (d.definition_vi) html += `<div style="font-size:13px;color:var(--green);margin-top:2px">📝 ${esc(d.definition_vi)}</div>`;
        if (d.example) html += `<div class="def-example">▸ ${esc(d.example)}</div>`;
        if (d.example_vi) html += `<div style="font-size:12px;color:var(--green);margin-top:1px;padding-left:30px">📝 ${esc(d.example_vi)}</div>`;
        if (d.synonyms && d.synonyms.length) {
          html += `<div class="def-synonyms">${d.synonyms.map(s => `<span class="syn-tag">${esc(s)}</span>`).join("")}</div>`;
        }
        html += `</div></div>`;
      });
      html += `</div>`;
    });
  }

  el.innerHTML = html;
}

function playAudio(url) {
  const a = new Audio(url);
  a.play().catch(() => {});
}

// ----- QUIZ -----
async function renderQuiz() {
  const el = document.getElementById("quiz-content");
  if (quizState && quizState.step < quizState.questions.length && !quizState.showingResult) {
    renderQuizQuestion(el, quizState);
    return;
  }
  try {
    const r = await api("GET", "/api/quiz");
    if (r.error) {
      el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary);padding:20px 0">${r.error}</p></div>`;
      return;
    }
    if (!r.questions || r.questions.length === 0) {
      el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--muted);padding:20px 0">${t("fc_no_words")}</p></div>`;
      return;
    }
    quizState = { questions: r.questions, step: 0, correct: 0, answered: false, showingResult: false };
    renderQuizQuestion(el, quizState);
  } catch {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary);padding:20px 0">${t("dict_network")}</p></div>`;
  }
}

function renderQuizQuestion(el, state) {
  if (state.step >= state.questions.length) {
    renderQuizComplete(el, state);
    return;
  }
  const q = state.questions[state.step];
  const answered = state.answered;
  el.innerHTML = `
    <div class="card text-center fade-in">
      <h3>${t("quiz_header")}</h3>
      <div style="font-size:12px;color:var(--muted)">${state.step + 1} / ${state.questions.length}</div>
      <div class="word-display" style="padding:12px 0">
        <div class="word">${esc(q.word)}</div>
        <div class="ipa">${esc(q.ipa)}</div>
        <p style="font-size:13px;color:var(--muted);margin-top:8px">${t("quiz_what")}</p>
      </div>
    </div>
    ${q.options.map((opt, i) => {
      let cls = "option-btn";
      if (answered) {
        cls += " disabled";
        if (opt === q.correct) cls += " correct";
        else if (opt === state.selected) cls += " wrong";
      }
      return `<button class="${cls}" data-idx="${i}" ${answered ? "disabled" : ""}>${esc(opt)}</button>`;
    }).join("")}
    ${answered ? `
      <div class="card text-center fade-in mt-8">
        <span class="result-badge ${state.selected === q.correct ? 'correct' : 'wrong'}">
          ${state.selected === q.correct ? t("quiz_correct") : t("quiz_wrong")}
        </span>
        <div style="margin-top:8px;font-size:13px;color:var(--muted)">${t("quiz_score")} ${state.correct}/${state.step + 1}</div>
        <button class="btn btn-primary btn-full mt-8" id="quiz-next">
          ${state.step + 1 < state.questions.length ? t("quiz_next") : t("quiz_finish")}
        </button>
      </div>
    ` : `<p style="text-align:center;color:var(--muted);font-size:12px;margin-top:8px">${t("quiz_score")} ${state.correct}/${state.step}</p>`}
  `;

  if (!answered) {
    el.querySelectorAll(".option-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.idx);
        state.selected = q.options[idx];
        state.answered = true;
        if (state.selected === q.correct) state.correct++;
        renderQuizQuestion(el, state);
      });
    });
  } else {
    document.getElementById("quiz-next")?.addEventListener("click", () => {
      state.step++;
      state.answered = false;
      state.showingResult = false;
      renderQuizQuestion(el, state);
    });
  }
}

function renderQuizComplete(el, state) {
  const total = state.questions.length;
  const pct = total ? Math.round(state.correct / total * 100) : 0;
  let msg = t("quiz_study");
  if (pct >= 80) msg = t("quiz_excellent");
  else if (pct >= 50) msg = t("quiz_good");
  else if (pct >= 30) msg = t("quiz_trying");

  el.innerHTML = `
    <div class="card text-center fade-in">
      <h3>${t("quiz_complete")}</h3>
      <div style="font-size:36px;margin:12px 0">${state.correct}/${total}</div>
      <div class="progress-bar" style="max-width:200px;margin:8px auto">
        <div class="fill" style="width:${pct}%"></div>
      </div>
      <p style="color:var(--muted);font-size:13px">${t("quiz_final")} ${state.correct}/${total}</p>
      <p style="color:var(--muted);font-size:13px">${t("quiz_pct")} ${pct}%</p>
      <p style="margin-top:8px;font-weight:600">${msg}</p>
    </div>
    <button class="btn btn-primary btn-full mt-8" id="quiz-restart">${t("quiz_header")}</button>
  `;
  document.getElementById("quiz-restart")?.addEventListener("click", () => {
    quizState = null;
    renderQuiz();
  });
}

// ----- GRAMMAR -----
async function renderGrammar() {
  const el = document.getElementById("grammar-content");
  el.innerHTML = `<div class="text-center mt-16"><div class="spinner"></div></div>`;
  try {
    const r = await api("GET", "/api/grammar");
    if (!r || r.length === 0) {
      el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--muted);padding:20px 0">Grammar data not found</p></div>`;
      return;
    }
    const tenses = r.filter(g => g.category === "tense");
    const conds = r.filter(g => g.category === "conditional");

    let html = `<div class="card fade-in"><h3>${t("grammar_tense")}</h3></div>`;
    tenses.forEach(g => { html += renderGrammarItem(g); });
    html += `<div class="card fade-in mt-12"><h3>${t("grammar_conditional")}</h3></div>`;
    conds.forEach(g => { html += renderGrammarItem(g); });

    el.innerHTML = html;

    el.querySelectorAll(".grammar-toggle").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.id;
        const detail = document.getElementById("grammar-detail-" + id);
        const isOpen = detail.style.display !== "none";
        detail.style.display = isOpen ? "none" : "block";
        btn.textContent = isOpen ? "▶" : "▼";
      });
    });
  } catch {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary);padding:20px 0">${t("dict_network")}</p></div>`;
  }
}

function renderGrammarItem(g) {
  const examples = g.examples.map((ex, i) =>
    `<div style="margin-top:${i > 0 ? '8' : '4'}px;font-size:13px">
       <div style="color:var(--text)">▸ ${esc(ex.en)}</div>
       <div style="color:var(--green);font-size:12px">${esc(ex.vi)}</div>
     </div>`
  ).join("");

  const keywords = g.keywords && g.keywords.length
    ? `<div style="margin-top:6px;font-size:12px;color:var(--muted)"><strong>${t("grammar_keywords")}:</strong> ${esc(g.keywords.join(", "))}</div>`
    : "";

  return `
    <div class="card fade-in" style="padding:10px 16px;margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:8px;cursor:pointer" class="grammar-toggle" data-id="${g.id}">
        <span style="font-size:12px;color:var(--cyan)">▶</span>
        <strong style="color:var(--yellow);font-size:14px">${esc(g.title)}</strong>
        <span style="color:var(--green);font-size:12px">(${esc(g.title_vi)})</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${t("grammar_expand")}</span>
      </div>
      <div id="grammar-detail-${g.id}" style="display:none;margin-top:8px;border-top:1px solid #2a2a4e;padding-top:8px">
        <div style="font-size:13px;color:var(--cyan);font-weight:500">${t("grammar_formula")}:</div>
        <div style="font-size:14px;color:var(--yellow);margin-top:2px">${esc(g.formula)}</div>
        <div style="font-size:13px;color:var(--green);margin-top:1px">${esc(g.formula_vi)}</div>
        <div style="font-size:13px;color:var(--cyan);font-weight:500;margin-top:8px">${t("grammar_usage")}:</div>
        <div style="font-size:13px;margin-top:2px;color:var(--text)">${esc(g.usage)}</div>
        <div style="font-size:12px;margin-top:1px;color:var(--green)">${esc(g.usage_vi)}</div>
        ${keywords}
        <div style="font-size:13px;color:var(--cyan);font-weight:500;margin-top:8px">${t("grammar_examples")}:</div>
        ${examples}
      </div>
    </div>
  `;
}

// ----- PROGRESS -----
async function renderProgress() {
  const el = document.getElementById("progress-content");
  el.innerHTML = `<div class="text-center mt-16"><div class="spinner"></div></div>`;
  let r;
  try {
    r = await api("GET", "/api/stats");
  } catch {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary);padding:20px 0">${t("dict_network")}</p></div>`;
    return;
  }
  const pct = r.total ? Math.round(r.learned / r.total * 100) : 0;
  el.innerHTML = `
    <div class="card fade-in">
      <h3>${t("prog_title")}</h3>
      <div class="progress-bar mt-8">
        <div class="fill" style="width:${pct}%"></div>
      </div>
      <div class="stat-row mt-8">
        <span class="stat-label">${t("prog_total")}</span>
        <span class="stat-value">${r.total}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">${t("prog_learned")}</span>
        <span class="stat-value" style="color:var(--green)">${r.learned}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">${t("prog_remaining")}</span>
        <span class="stat-value" style="color:var(--yellow)">${r.remaining}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">${t("prog_today")}</span>
        <span class="stat-value" style="color:var(--cyan)">${r.reviews_today || 0}</span>
      </div>
    </div>
  `;
}

// ----- WORDS -----
let wordsFilter = "all";
let wordsSearchQuery = "";

async function renderWords() {
  const el = document.getElementById("words-content");
  el.innerHTML = `<div class="text-center mt-16"><div class="spinner"></div><p style="color:var(--muted);font-size:13px;margin-top:8px">${t("words_loading")}</p></div>`;
  try {
    const r = await api("GET", "/api/words");
    const words = r.words || [];

    el.innerHTML = `
      <input type="text" id="words-search-input" class="search-box" placeholder="${t("words_search")}">
      <div class="btn-group mt-8" id="words-filter-bar">
        <button class="btn btn-primary" data-filter="all">${t("words_all")}</button>
        <button class="btn btn-outline" data-filter="learned">${t("words_learned")}</button>
        <button class="btn btn-outline" data-filter="new">${t("words_new")}</button>
      </div>
      <div id="words-list" class="mt-8"></div>
    `;

    document.getElementById("words-search-input").addEventListener("input", (e) => {
      wordsSearchQuery = e.target.value.toLowerCase();
      renderWordsList(words);
    });

    document.querySelectorAll("#words-filter-bar .btn").forEach(btn => {
      btn.addEventListener("click", () => {
        wordsFilter = btn.dataset.filter;
        document.querySelectorAll("#words-filter-bar .btn").forEach(b => {
          b.className = "btn btn-outline";
        });
        btn.className = "btn btn-primary";
        renderWordsList(words);
      });
    });

    renderWordsList(words);
  } catch {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--primary);padding:20px 0">${t("dict_network")}</p></div>`;
  }
}

function renderWordsList(words) {
  const el = document.getElementById("words-list");
  const filtered = words.filter(w => {
    if (wordsFilter === "learned" && !w.learned) return false;
    if (wordsFilter === "new" && w.learned) return false;
    if (wordsSearchQuery && !w.word.toLowerCase().includes(wordsSearchQuery) && !(w.meaning || '').toLowerCase().includes(wordsSearchQuery)) return false;
    return true;
  });

  if (filtered.length === 0) {
    el.innerHTML = `<div class="card text-center fade-in"><p style="color:var(--muted);padding:20px 0">${t("words_all")} — 0</p></div>`;
    return;
  }

  el.innerHTML = filtered.map(w => {
    const levelDots = "●".repeat(Math.min(w.level, 5)) + "○".repeat(Math.max(0, 5 - Math.min(w.level, 5)));
    return `
      <div class="card fade-in word-item" data-word="${esc(w.word)}" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div>
            <strong style="color:var(--yellow);font-size:16px">${esc(w.word)}</strong>
            <span style="color:var(--cyan);font-size:13px;margin-left:8px">${esc(w.ipa)}</span>
          </div>
          <span style="font-size:12px;color:${w.learned ? 'var(--green)' : 'var(--muted)'}">${w.learned ? levelDots : "—"}</span>
        </div>
        <div style="margin-top:4px;font-size:14px;color:var(--green)">${esc(w.meaning)}</div>
        ${w.definition ? `<div style="margin-top:2px;font-size:13px;color:var(--cyan)">📖 ${esc(w.definition)}</div>` : ""}
        ${w.definition_vi ? `<div style="font-size:13px;color:var(--green)">📝 ${esc(w.definition_vi)}</div>` : ""}
        ${w.example ? `<div style="margin-top:4px;font-size:12px;color:var(--muted);font-style:italic">${esc(w.example)}</div>` : ""}
        ${w.example_vi ? `<div style="margin-top:2px;font-size:12px;color:var(--green);">📝 ${esc(w.example_vi)}</div>` : ""}
        <div style="margin-top:6px;font-size:11px;color:var(--muted)">
          ${w.learned ? `${t("words_level")} ${w.level} / 5` : t("words_new")}
        </div>
      </div>
    `;
  }).join("");

  el.querySelectorAll(".word-item").forEach(item => {
    item.addEventListener("click", () => {
      const word = item.dataset.word;
      document.getElementById("dict-input").value = word;
      document.querySelector('[data-tab="dictionary"]').click();
      dictSearch();
    });
  });
}

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  const tabMap = { "1": "flashcards", "2": "dictionary", "3": "quiz", "4": "grammar", "5": "progress", "6": "words", "7": "settings" };
  const tab = tabMap[e.key];
  if (tab) {
    const btn = document.querySelector(`[data-tab="${tab}"]`);
    if (btn) btn.click();
  }
});

init();
</script>
</body>
</html>
